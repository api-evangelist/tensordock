naftiko: 1.0.0-alpha2
info:
  label: TensorDock Marketplace API — Hostnodes
  description: 'TensorDock Marketplace API — Hostnodes. 2 operations. Lead operation: List Available Hostnodes.
    Self-contained Naftiko capability covering one TensorDock business surface.'
  tags:
  - TensorDock
  - Hostnodes
  - GPU
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    TENSORDOCK_API_KEY: TENSORDOCK_API_KEY
    TENSORDOCK_API_TOKEN: TENSORDOCK_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: marketplace-hostnodes
    baseUri: https://marketplace.tensordock.com
    description: Discover hostnodes and their GPU/CPU specifications.
    resources:
    - name: hostnodes
      path: /api/v0/client/deploy/hostnodes
      operations:
      - name: listhostnodes
        method: GET
        description: List all available hostnodes and their resources.
        inputParameters:
        - name: api_key
          value: '{{env.TENSORDOCK_API_KEY}}'
          in: query
        - name: api_token
          value: '{{env.TENSORDOCK_API_TOKEN}}'
          in: query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hostnode-detail
      path: /api/v0/client/deploy/hostnodes/{hostnode_uuid}
      operations:
      - name: gethostnode
        method: GET
        description: Get details for a specific hostnode by UUID.
        inputParameters:
        - name: api_key
          value: '{{env.TENSORDOCK_API_KEY}}'
          in: query
        - name: api_token
          value: '{{env.TENSORDOCK_API_TOKEN}}'
          in: query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: mcp
    namespace: marketplace-hostnodes-mcp
    port: 9090
    transport: http
    description: MCP adapter for hostnode discovery.
    tools:
    - name: tensordock-list-hostnodes
      description: List TensorDock hostnodes and available GPU/CPU configurations.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketplace-hostnodes.listhostnodes
      outputParameters:
      - type: object
        mapping: $.
    - name: tensordock-get-hostnode
      description: Get details for a specific TensorDock hostnode.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketplace-hostnodes.gethostnode
      outputParameters:
      - type: object
        mapping: $.
