specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: TensorDock
providerId: tensordock
created: '2026-05-25'
modified: '2026-05-25'
reconciled: true
tags:
  - GPU
  - Cloud
  - Compute
  - Marketplace
  - Hourly Pricing
description: 'Reconciled pricing for TensorDock GPU and CPU virtual machines. TensorDock operates a
  marketplace model where each independent host sets per-resource prices, so the figures below reflect
  starting (entry) hourly rates. Sources: tensordock.com and marketplace.tensordock.com/deploy.'
sources:
  - https://www.tensordock.com
  - https://marketplace.tensordock.com/deploy
  - https://docs.tensordock.com/virtual-machines/spot-instances
  - https://docs.tensordock.com/virtual-machines/introduction-to-core-compute-vms
plans:
  - id: tensordock-on-demand-gpu
    name: GPU On-Demand
    type: usage-based
    description: Per-microsecond billing for dedicated GPU virtual machines. Prices vary by GPU model
      and host; starting rates listed below.
    entries:
      - label: H100 SXM5 80GB hourly
        name: gpu_h100_sxm5
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '2.25'
        userMultiplied: false
      - label: A100 SXM4 80GB hourly
        name: gpu_a100_sxm4_80gb
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.87'
        userMultiplied: false
      - label: A100 PCIe 80GB hourly
        name: gpu_a100_pcie_80gb
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '1.27'
        userMultiplied: false
      - label: RTX 6000 Ada 48GB hourly
        name: gpu_rtx_6000_ada
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.72'
        userMultiplied: false
      - label: L40S 48GB hourly
        name: gpu_l40s
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.49'
        userMultiplied: false
      - label: L4 24GB hourly
        name: gpu_l4
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.24'
        userMultiplied: false
      - label: RTX A6000 48GB hourly
        name: gpu_rtx_a6000
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.42'
        userMultiplied: false
      - label: RTX 5090 32GB hourly
        name: gpu_rtx_5090
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.56'
        userMultiplied: false
      - label: RTX 4090 24GB hourly
        name: gpu_rtx_4090
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.32'
        userMultiplied: false
      - label: RTX 3090 24GB hourly
        name: gpu_rtx_3090
        type: metered
