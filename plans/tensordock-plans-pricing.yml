      - label: V100 SXM3 32GB hourly
        name: gpu_v100_sxm3
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.30'
        userMultiplied: false
      - label: V100 SXM2 16GB hourly
        name: gpu_v100_sxm2
        type: metered
