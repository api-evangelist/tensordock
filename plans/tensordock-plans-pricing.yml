        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.21'
        userMultiplied: false

  - id: tensordock-cpu-compute
    name: CPU Compute
    type: usage-based
    description: CPU-only virtual machines on Intel Xeon or AMD EPYC for transcoding and batch processing.
    entries:
      - label: vCPU hourly
        name: vcpu_hour
        type: metered
        metric: vcpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: '0.012'
        userMultiplied: false
      - label: RAM per GB hourly
        name: ram_gb_hour
        type: metered
        metric: gb_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: 'varies'
        userMultiplied: false
        notes: Host-set; check /api/v0/client/deploy/hostnodes for live rates.
      - label: Storage per GB hourly
        name: storage_gb_hour
        type: metered
        metric: gb_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: 'varies'
        userMultiplied: false

  - id: tensordock-spot
    name: Spot Instances
    type: bid-based
    description: Interruptible spot instances where the customer sets a bid price; lowest-priced
      eligible hostnode wins. Soft-validation endpoints let clients check whether a bid will clear
      before deploying.
    entries:
      - label: Spot bid
        name: spot_bid
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: 'variable'
        userMultiplied: false

  - id: tensordock-reserved
    name: Reserved
    type: contract
    description: Volume reservations with committed-use discounts available upon request from sales.
    entries:
      - label: Reserved capacity
        name: reserved
        type: contract
        metric: gpu
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: 'call'
        userMultiplied: false

  - id: tensordock-instant-vms
    name: Instant VMs (beta)
    type: usage-based
    description: Pre-configured Instant VM templates with sub-30-second deployment.
    entries:
      - label: Instant VM hourly
        name: instant_vm_hour
        type: metered
        metric: vm_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: 'varies'
        userMultiplied: false

  - id: tensordock-containers
    name: Containers
    type: usage-based
    description: GPU container workloads deployable via the v0 container endpoints.
    entries:
      - label: Container GPU hourly
        name: container_gpu_hour
        type: metered
        metric: gpu_hour
        limit: -1
        timeFrame: hour
        geo: global
        unit: 1
        price: 'varies'
        userMultiplied: false
notes:
  - Billing is pro-rated to the microsecond.
  - When account balance hits $0, instances are automatically stopped and eventually deleted.
  - All prices in USD; published rates exclude applicable taxes (VAT, GST).
  - Marketplace dynamics mean the same GPU model can show different prices at different hosts.
